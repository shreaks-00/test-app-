name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js 22 (required by Capacitor 8)
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # 3. Verify Node version
      - name: Check Node version
        run: node --version

      # 4. Install dependencies
      - name: Install dependencies
        run: npm install

      # 5. Build the web app (Vite)
      - name: Build web app
        run: npm run build

      # 6. Setup Java 17 (required for Gradle) - BEFORE cap sync
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 7. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 8. Write SDK path to local.properties so Gradle can find it
      - name: Set Android SDK path in local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          cat android/local.properties

      # 9. Sync Capacitor to Android
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 10. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 11. Build the Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # 12. Upload APK as downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ToolKit-Pro-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

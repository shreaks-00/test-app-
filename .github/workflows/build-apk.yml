name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the web app (Vite)
      - name: Build web app
        run: npm run build

      # 5. Sync Capacitor to Android
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 6. Setup Java (required for Gradle)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 7. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 8. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 9. Build the Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 10. Upload APK as artifact (download from GitHub)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ToolKit-Pro-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
